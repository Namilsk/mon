# Docker Compose for Node Agent only
# Use this on remote servers to connect to central monitor

services:
  node-agent:
    image: namilsk/monitor:latest
    container_name: monitor-agent
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    environment:
      - CENTRAL_URL=${CENTRAL_URL}
      - NODE_ID=${NODE_ID}
      - JWT_SECRET=${JWT_SECRET}
      - POLL_INTERVAL=${POLL_INTERVAL:-5}
    privileged: true
    restart: unless-stopped
